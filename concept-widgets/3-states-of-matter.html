<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot & Cold: States of Matter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Trebuchet MS', sans-serif;
    background: linear-gradient(135deg, #e3fafc 0%, #fff5f5 100%);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 24px; color: #333;
  }
  h1 { color: #1098ad; text-align: center; font-size: 1.9rem; }
  .subtitle { color: #777; margin: 4px 0 18px; text-align: center; }
  .card {
    background: #fff; border-radius: 24px; padding: 24px;
    box-shadow: 0 12px 40px rgba(16,152,173,0.18);
    max-width: 560px; width: 100%; text-align: center;
  }
  canvas { border-radius: 16px; width: 100%; max-width: 480px; display:block; margin:0 auto;
           background: linear-gradient(#0b1d2b, #11334a); }
  .state-label { font-size: 2rem; font-weight: bold; margin: 14px 0 4px; }
  .desc { color: #868e96; min-height: 1.4em; margin-bottom: 14px; }
  .slider-wrap { display: flex; align-items: center; gap: 12px; padding: 0 6px; }
  input[type=range]{ -webkit-appearance:none; flex:1; height: 14px; border-radius: 8px;
    background: linear-gradient(90deg,#4dabf7,#ffd43b,#ff6b6b); outline:none; }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:30px; height:30px;
    border-radius:50%; background:#fff; border:3px solid #495057; cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,.3); }
  .thermo { font-size: 1.8rem; }
  .temp { font-weight: bold; font-size: 1.2rem; color:#495057; margin-top:6px; }
</style>
</head>
<body>
  <h1>🧊 Why Does Ice Melt?</h1>
  <p class="subtitle">Heat makes tiny particles move faster. Drag the slider!</p>
  <div class="card">
    <canvas id="c" width="480" height="320"></canvas>
    <div class="state-label" id="stateLabel">Solid (Ice)</div>
    <div class="desc" id="desc">Particles are locked together and barely wiggle.</div>
    <div class="slider-wrap">
      <span class="thermo">❄️</span>
      <input type="range" id="temp" min="0" max="100" value="10">
      <span class="thermo">🔥</span>
    </div>
    <div class="temp" id="tempVal">Cold</div>
  </div>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const N = 64;
  let temp = 10;

  // particles
  const parts = [];
  const cols = 8, rows = 8, spacing = 30, ox = W/2 - (cols-1)*spacing/2, oy = H - 40 - (rows-1)*spacing;
  for(let r=0;r<rows;r++) for(let cc=0;cc<cols;cc++){
    parts.push({
      hx: ox + cc*spacing, hy: oy + r*spacing, // home position (lattice)
      x: ox + cc*spacing, y: oy + r*spacing,
      vx:0, vy:0
    });
  }

  document.getElementById('temp').addEventListener('input', e=>{ temp = +e.target.value; updateLabels(); });

  function updateLabels(){
    const L = document.getElementById('stateLabel');
    const D = document.getElementById('desc');
    const T = document.getElementById('tempVal');
    if(temp < 33){ L.textContent='Solid (Ice) 🧊'; L.style.color='#4dabf7';
      D.textContent='Particles are locked in place and only jiggle a little.'; T.textContent='Cold ❄️'; }
    else if(temp < 67){ L.textContent='Liquid (Water) 💧'; L.style.color='#ffa94d';
      D.textContent='Particles slide past each other — they can flow now!'; T.textContent='Warm'; }
    else { L.textContent='Gas (Steam) ☁️'; L.style.color='#ff6b6b';
      D.textContent='Particles zoom around freely and fly everywhere!'; T.textContent='Hot 🔥'; }
  }

  function step(){
    const energy = temp/100;          // 0..1
    const jiggle = energy * 6;
    const freedom = Math.max(0, (temp-33)/67); // how loose from lattice (0 solid -> 1 gas)
    const gasMode = temp >= 67;

    for(const p of parts){
      // random thermal kick
      p.vx += (Math.random()-0.5) * jiggle;
      p.vy += (Math.random()-0.5) * jiggle;

      if(!gasMode){
        // spring pull back toward home lattice; weaker when warmer
        const k = 0.18 * (1 - freedom*0.85);
        p.vx += (p.hx - p.x) * k;
        p.vy += (p.hy - p.y) * k;
        p.vx *= 0.82; p.vy *= 0.82; // damping
        // gravity-ish settle for liquid
        if(temp>=33) p.vy += 0.25;
      } else {
        p.vx *= 0.99; p.vy *= 0.99;
        p.vy += 0.02;
      }

      p.x += p.vx; p.y += p.vy;

      // walls (the "container")
      if(p.x < 8){ p.x=8; p.vx*=-0.8; }
      if(p.x > W-8){ p.x=W-8; p.vx*=-0.8; }
      if(p.y < 8){ p.y=8; p.vy*=-0.8; }
      if(p.y > H-8){ p.y=H-8; p.vy*=-0.8; }
    }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    // container floor line
    ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=2;
    ctx.strokeRect(6,6,W-12,H-12);
    for(const p of parts){
      const energy = temp/100;
      // color from blue (cold) -> orange -> red (hot)
      let col;
      if(temp<33) col = '#74c0fc';
      else if(temp<67) col = '#ffd43b';
      else col = '#ff8787';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 7, 0, Math.PI*2);
      ctx.fillStyle = col;
      ctx.shadowColor = col; ctx.shadowBlur = 8 + energy*12;
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }

  function loop(){ step(); draw(); requestAnimationFrame(loop); }
  updateLabels(); loop();
</script>
</body>
</html>
